<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>All Posters — Prateek Gupta</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  color:#fff;
  font-family:"Segoe UI",system-ui,sans-serif;
}

/* MODAL CONTENT DESKTOP */
.modal-content{
    display:flex;
    gap:40px;
    max-width:1000px;
    width:90%;
}

/* IMAGE */
.modal-content img{
    width:400px;
    height:auto;
}

/* TEXT */
.modal-description{
    flex:1;
    overflow-y:auto;
}

/* MOBILE FIX */
@media (max-width:768px){

    .modal-content{
        flex-direction:column;
        align-items:center;
        max-height:90vh;
        overflow-y:auto;
        padding:20px;
    }

    .modal-content img{
        width:100%;
        max-width:400px;
    }
}
/* ===== RESPONSIVE FIX FOR ALL POSTERS ===== */

/* Tablet */
@media (max-width:1024px){
  .grid{
    grid-template-columns: repeat(2, 1fr);
  }
}

/* Mobile */
@media (max-width:768px){

  .grid{
    grid-template-columns: 1fr;
    gap:25px;
  }

  .modal-content{
    flex-direction:column;
    height:auto;
    padding:20px;
  }

  .modal-left{
    position:relative;
    height:60vh;
  }

  .modal-right{
    flex:1;
    padding:25px 0;
  }

  .arrow{
    font-size:35px;
  }

}

h1{
  text-align:center;
  margin:80px 0 50px;
}

.back{
  position:absolute;
  top:30px;
  left:40px;
  text-decoration:none;
  color:white;
}

.grid{
    padding:80px 8%;
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:40px;
}
@media (max-width: 768px) {
    .grid{
        grid-template-columns: 1fr;
        gap:25px;
    }
}

.poster{
    width:100%;
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.poster img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.poster:hover{
  transform:translateY(-8px);
  box-shadow:0 20px 40px rgba(0,0,0,0.7);
}

/* MODAL */

.modal{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  transform:translateX(100%);
  transition:0.5s ease;
  z-index:2000;
}

.modal.active{
  transform:translateX(0);
}

.modal-content{
  width:90%;
  max-height:90vh;
  display:flex;
}

.modal-left{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.modal-left{
  position:relative;
  overflow:hidden;
}

.modal-left img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:contain;
  border-radius:16px;
  transition:transform 0.45s ease, opacity 0.45s ease;
}

/* slide directions */
.slide-out-left{
  transform:translateX(-120%);
  opacity:0;
}

.slide-out-right{
  transform:translateX(120%);
  opacity:0;
}

.slide-in-right{
  transform:translateX(120%);
  opacity:0;
}

.slide-in-left{
  transform:translateX(-120%);
  opacity:0;
}

.active-image{
  transform:translateX(0);
  opacity:1;
}

.modal-right{
  flex:0.6;
  padding:60px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.modal-right h2{
  font-size:2rem;
  margin-bottom:20px;
}

.modal-right p{
  color:#ccc;
  line-height:1.7;
}

.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:50px;
  background:none;
  border:none;
  color:white;
  cursor:pointer;
  padding:20px;
  z-index:3000;
  transition:0.3s;
}

.arrow:hover{
  color:#baff00;
  text-shadow:0 0 20px #baff00;
}

.left{
  left:40px;
}

.right{
  right:40px;
}

</style>

<body>

<a href="index.html" class="back">← Back to Home</a>

<h1>POSTER VAULT                                      </h1>

<div class="grid" id="posterGrid"></div>

<div class="modal" id="modal">

  <!-- LEFT ARROW -->
  <button class="arrow left" onclick="prevPoster()">❮</button>

  <div class="modal-content">
    <div class="modal-left">
      <img id="modalImage">
    </div>

    <div class="modal-right">
      <h2 id="posterTitle"></h2>
      <p id="posterDesc"></p>
    </div>
  </div>

  <!-- RIGHT ARROW -->
  <button class="arrow right" onclick="nextPoster()">❯</button>

</div>

<script>

const grid = document.getElementById("posterGrid");
const modal = document.getElementById("modal");
const modalImage = document.getElementById("modalImage");
const posterTitle = document.getElementById("posterTitle");
const posterDesc = document.getElementById("posterDesc");

let posters = [

{ src:"images/poster3.jpg", title:"Ciggerate After What?", desc:"This poster visualizes chaos in motion—falling, losing control, surrendering.\nThe scattered papers represent collapsing thoughts and emotional overwhelm.\nBold red typography intensifies the feeling of inner destruction.\nA dramatic portrayal of self-expression at breaking point." },

{ src:"images/poster4.jpg", title:"Vengeance in Red", desc:"A bold cinematic composition inspired by The Batman.\nThe dominant red and black palette reflects rage, justice, and mystery.\nLayered collage elements resemble torn newspaper headlines and urban chaos.\nThis design embodies darkness, power, and the duality of a vigilante." },

{ src:"images/poster5.jpg", title:"No Substitute", desc:"A performance-driven design centered around the Porsche GT3RS.\nClean symmetry and high contrast elevate the car as the true protagonist.\nRed accents highlight speed, aggression, and racing DNA.\nA minimal yet bold tribute to precision engineering." },

{ src:"images/poster6.jpg", title:"I Love Cannibalism", desc:"A psychological composition inspired by Hannibal’s refined darkness.\nDeep reds and textured gold typography reflect elegance and brutality.\nSymmetry enhances the unsettling calm beneath the violence.\nA visual exploration of intellect wrapped in horror." },

{ src:"images/poster7.jpg", title:"The Healing Process Hurts.", desc:"Raw, emotional imagery blends pain and recovery into one narrative.\nDripping typography symbolizes wounds that are still open.\nThe stark monochrome visuals intensify feelings of vulnerability.\nA haunting representation of trauma and transformation." },

{ src:"images/poster8.jpg", title:"Connection Beyond Distance", desc:"Inspired by Michelangelo’s touch, this design explores human connection.\nEyes serve as portals—reflecting fragility, depth, and intimacy.\nMinimal color adds dramatic emotional focus.\nA conceptual piece about longing, presence, and unseen bonds." },

{ src:"images/poster9.jpg", title:"Romantic Homicide", desc:"A melancholic visual interpretation of d4vd’s emotional storytelling.\nMuted florals contrast with dark undertones of heartbreak.\nThe layered composition evokes softness hiding inner pain.\nA poetic depiction of love turning destructive." },

{ src:"images/poster10.jpg", title:"DAMN. – Fragmented Reality", desc:"Glitch effects and bold typography mirror Kendrick Lamar’s raw energy.\nThe floating figure symbolizes conflict between ego and truth.\nNeon distortion enhances the feeling of internal battle.\nA striking fusion of hip-hop culture and visual disruption." },

{ src:"images/poster11.jpg", title:"Elementary Love", desc:"A vintage collage blending London’s charm with mystery.\nSoft sepia tones and layered cut-outs create nostalgic storytelling.\nHorses, architecture, and subtle symbolism merge romance and intellect.\nA visual journey through curiosity, love, and classic elegance." },

{ src:"images/poster12.jpg", title:"The Duo — Fast & Legacy", desc:"A high-octane tribute to speed and brotherhood.\nMuscle car dominance meets cinematic typography." },

{ src:"images/poster13.jpg", title:"GNX — Album Visual Identity", desc:"Tracklist-focused layout with strong hierarchy.\nMinimal monochrome styling enhances bold rap aesthetics." },

{ src:"images/poster14.jpg", title:"Where Were The Gods?", desc:"A mythological reinterpretation of Perseus and Medusa.\nDramatic typography and sculpture imagery amplify tragedy." },

{ src:"images/poster15.jpg", title:"Hulk — Rage Unleashed", desc:"Exploring power and inner conflict through bold green dominance.\nLightning effects enhance intensity and symbolism." },

{ src:"images/poster20.jpg", title:"Knight Dollus — Deception", desc:"Medieval-inspired character concept.\nLight and shadow emphasize mystery and strategic power." },

{ src:"images/poster21.jpg", title:"Chelsea vs Man City", desc:"Sports energy captured through layered player cutouts.\nDynamic composition reflects rivalry and dominance." },

{ src:"images/poster23.jpg", title:"Money Chase — Collage Concept", desc:"Consumerism and identity explored through layered visuals.\nBold red typography ties the narrative together." },

{ src:"images/poster33.jpg", title:"The Batman – Vengeance", desc:"High contrast black and red palette.\nCinematic layered poster design.\nTypography as dominant headline.\nDark hero-focused storytelling." },

{ src:"images/poster34.jpg", title:"Air Jordan Legacy", desc:"Minimalistic luxury composition.\nStrong silhouette usage.\nBalanced typography and quote placement.\nCelebrates greatness and ambition." },

{ src:"images/poster35.jpg", title:"Breaking Code", desc:"A visual metaphor for creation through logic.\nBlending spirituality with technology, this piece explores coding as a modern form of power where structure shapes reality.\nCelebrates greatness and ambition." },

{ src:"images/poster36.jpg", title:"Cataclysm", desc:"An exploration of love as destruction and rebirth.\nRaw, consuming, and irreversible emotion portrayed as a force that dismantles identity and reconstructs it anew." },

{ src:"images/poster37.jpg", title:"Love Through Time", desc:"A layered study of intimacy across different stages of life.\nContrasting youth, permanence, and mortality — love becomes both fragile and eternal." },

{ src:"images/poster38.jpg", title:"Rekindling Bonds", desc:"A minimalist representation of distance and reconnection.\nInspired by classical composition, this piece captures the tension between separation and inevitable return." },

{ src:"images/poster39.jpg", title:"Dream in Motion", desc:"A collision of ambition, illusion, and calculated fate.\nThrough distortion and surreal symbolism, the work questions control, destiny, and the price of aspiration." },

{ src:"images/poster40.jpg", title:"The Smiths — 1984", desc:"An homage to melancholy culture and poetic rebellion.\nFusing nostalgia with bold typography, it reflects the romantic fatalism embedded in alternative music history." },

{ src:"images/poster41.jpg", title:"Into the Void", desc:"A psychological descent into fear and fragmentation.\nBuilt on stark contrast and unsettling imagery, this piece confronts the subconscious without restraint." }

];

let currentIndex=0;

function openModal(index){
  currentIndex=index;
  modalImage.src=posters[index].src;
  posterTitle.innerText=posters[index].title;
  posterDesc.innerText=posters[index].desc;
  modal.classList.add("active");
}

function closeModal(){
  modal.classList.remove("active");
}

function nextPoster(){

  modalImage.classList.remove("active-image");
  modalImage.classList.add("slide-out-left");

  setTimeout(()=>{

    currentIndex = (currentIndex + 1) % posters.length;

    modalImage.src = posters[currentIndex].src;
    posterTitle.innerText = posters[currentIndex].title;
    posterDesc.innerText = posters[currentIndex].desc;

    modalImage.classList.remove("slide-out-left");
    modalImage.classList.add("slide-in-right");

    setTimeout(()=>{
      modalImage.classList.remove("slide-in-right");
      modalImage.classList.add("active-image");
    }, 50);

  }, 450);
}


function prevPoster(){

  modalImage.classList.remove("active-image");
  modalImage.classList.add("slide-out-right");

  setTimeout(()=>{

    currentIndex = (currentIndex - 1 + posters.length) % posters.length;

    modalImage.src = posters[currentIndex].src;
    posterTitle.innerText = posters[currentIndex].title;
    posterDesc.innerText = posters[currentIndex].desc;

    modalImage.classList.remove("slide-out-right");
    modalImage.classList.add("slide-in-left");

    setTimeout(()=>{
      modalImage.classList.remove("slide-in-left");
      modalImage.classList.add("active-image");
    }, 50);

  }, 450);
}

posters.forEach((poster,index)=>{
  grid.innerHTML+=`
    <div class="poster" onclick="openModal(${index})">
      <img src="${poster.src}">
    </div>
  `;
});

document.addEventListener("keydown",function(e){
  if(!modal.classList.contains("active")) return;

  if(e.key==="ArrowRight") nextPoster();
  if(e.key==="ArrowLeft") prevPoster();
  if(e.key==="Escape") closeModal();
});

</script>

</body>
</html>
