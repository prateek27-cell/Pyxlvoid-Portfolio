<style>

.contact {
  text-align: center;
  padding: 80px 20px;

}

.contact h2 {
  font-size: 40px;
  margin-bottom: 40px;
  letter-spacing: 2px;
}

.contact-links {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 25px;
}

.contact-links a {
  text-decoration: none;
  color: white;
  font-size: 18px;
  padding: 12px 25px;
  border: 2px solid white;
  border-radius: 8px;
  transition: 0.3s;
}

.contact-links a:hover {
  background: white;
  color: black;
}

  /* IMAGE SLIDE ANIMATION */
.modal-left{
  position:relative;
  overflow:hidden;
}

.modal-left img{
  position:absolute;
  max-width:100%;
  max-height:100%;
  border-radius:16px;
  transition:transform 0.4s ease;
}

.slide-left{
  transform:translateX(-100%);
}

.slide-right{
  transform:translateX(100%);
}

.active-image{
  transform:translateX(0);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  color:#fff;
  font-family:"Segoe UI",system-ui,sans-serif;
}

h1{
  text-align:center;
  margin:80px 0 50px;
}

.back{
  position:absolute;
  top:30px;
  left:40px;
  text-decoration:none;
  color:white;
}

.grid{
  padding:0 8% 120px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:40px;
}

.poster{
  height:350px;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.poster img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.poster:hover{
  transform:translateY(-8px);
  box-shadow:0 25px 50px rgba(0,0,0,0.6);
}

/* SLIDE MODAL */
.modal{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  transform:translateX(100%);
  transition:0.6s ease;
  z-index:2000;
}

.modal.active{
  transform:translateX(0);
}

.modal-content{
  display:flex;
  width:90%;
  height:85%;
}

.modal-left{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.modal-left img{
  max-width:100%;
  max-height:100%;
  border-radius:16px;
}

.modal-right{
  flex:0.6;
  padding:60px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.modal-right h2{
  font-size:2rem;
  margin-bottom:20px;
}

.modal-right p{
  color:#ccc;
  line-height:1.7;
}
</style>
</head>

let currentIndex=0;

function openModal(index){
  currentIndex=index;
  modalImage.src=posters[index].src;
  posterTitle.innerText=posters[index].title;
  posterDesc.innerText=posters[index].desc;
  modal.classList.add("active");
}

function closeModal(){
  modal.classList.remove("active");
}

function nextPoster(){
  modalImage.classList.add("slide-left");

  setTimeout(()=>{
    currentIndex=(currentIndex+1)%posters.length;

    modalImage.src=posters[currentIndex].src;
    posterTitle.innerText=posters[currentIndex].title;
    posterDesc.innerText=posters[currentIndex].desc;

    modalImage.classList.remove("slide-left");
  },300);
}

function prevPoster(){
  modalImage.classList.add("slide-right");

  setTimeout(()=>{
    currentIndex=(currentIndex-1+posters.length)%posters.length;

    modalImage.src=posters[currentIndex].src;
    posterTitle.innerText=posters[currentIndex].title;
    posterDesc.innerText=posters[currentIndex].desc;

    modalImage.classList.remove("slide-right");
  },300);
}

document.addEventListener("keydown",function(e){
  if(e.key==="Escape"){
    closeModal();
  }
});

document.addEventListener("keydown",function(e){
  if(!modal.classList.contains("active")) return;

  if(e.key==="ArrowRight") nextPoster();
  if(e.key==="ArrowLeft") prevPoster();
  if(e.key==="Escape") closeModal();
});

posters.forEach((poster, index) => {
  grid.innerHTML += `
    <div class="poster" onclick="openModal(${index})">
      <img src="${poster.src}">
    </div>
  `;
});
