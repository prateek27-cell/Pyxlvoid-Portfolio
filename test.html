<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Poster Portfolio — Prateek Gupta</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

:root {
  --bg:#000000;
  --text:#ff0000;
  --muted:#ffffff;
}

body {
  background:var(--bg);
  color:var(--text);
  font-family:"Segoe UI", system-ui, sans-serif;
  line-height:1.6;
}

/* NAVBAR */
nav {
  position:fixed;
  top:0;
  width:100%;
  padding:18px 8%;
  background:rgba(11,11,12,0.9);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
}

nav h1 { font-size:1.3rem; }

nav ul {
  display:flex;
  list-style:none;
  gap:25px;
}

nav a {
  color:var(--muted);
  text-decoration:none;
  font-size:0.95rem;
}

section { padding:120px 8%; }

/* HERO */
.hero {
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero img {
  width:220px;
  height:220px;
  border-radius:50%;
  border:3px solid rgba(255,255,255,0.3);
  object-fit:cover;
  margin-bottom:30px;
}

.hero h2 { font-size:3.5rem; }
.line {
  width:80px; height:4px;
  background:white;
  margin:20px auto;
}

.tagline { font-size:1.7rem; font-weight:600; }
.intro { color:var(--muted); margin-top:15px; }

/* PORTFOLIO */
.portfolio { text-align:center; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
  gap:60px;
  margin-top:50px;
}

.poster {
  height:360px;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:0.4s;
}

.poster img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.poster:hover {
  transform:translateY(-10px);
  box-shadow:0 30px 60px rgba(0,0,0,0.6);
}

/* NEW SLIDE MODAL */
.modal {
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  transform:translateX(100%);
  transition:transform 0.6s ease;
  z-index:2000;
}

.modal.active {
  transform:translateX(0);
}

.modal-content {
  display:flex;
  width:90%;
  height:85%;
}

.modal-left {
  flex:1.2;
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-left img {
  max-height:100%;
  max-width:100%;
  border-radius:16px;
  transform:scale(0.92);
  transition:0.4s ease;
}

.modal-right {
  flex:0.8;
  color:white;
  padding:60px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  animation:fadeIn 0.6s ease;
}

.modal-right h2 {
  margin-bottom:20px;
  font-size:2rem;
  color:white;
}

.modal-right p {
  color:#ccc;
  line-height:1.7;
}

@keyframes fadeIn {
  from { opacity:0; transform:translateX(40px); }
  to { opacity:1; transform:translateX(0); }
}

.close {
  position:absolute;
  top:25px;
  right:35px;
  font-size:2rem;
  cursor:pointer;
  color:white;
}

.nav-btn {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:3rem;
  background:rgba(0,0,0,0.6);
  border:none;
  color:white;
  padding:10px 18px;
  cursor:pointer;
  border-radius:8px;
}

.prev-btn { left:40px; }
.next-btn { right:40px; }

footer {
  text-align:center;
  padding:40px;
  color:#666;
}
</style>
</head>

<body>

<section class="portfolio">
  <h3>MY POSTERS</h3>

  <div class="grid">
    <div class="poster" onclick="openModal('./images/poster1.jpg')">
      <img src="./images/poster1.jpg">
    </div>
    <div class="poster" onclick="openModal('./images/poster2.jpg')">
      <img src="./images/poster2.jpg">
    </div>
    <div class="poster" onclick="openModal('./images/poster3.jpg')">
      <img src="./images/poster3.jpg">
    </div>
    <div class="poster" onclick="openModal('./images/poster4.jpg')">
      <img src="./images/poster4.jpg">
    </div>
  </div>
</section>

<div class="modal" id="modal">
  <span class="close" onclick="closeModal()">×</span>

  <button class="nav-btn prev-btn" onclick="prevPoster()">❮</button>

  <div class="modal-content">
    <div class="modal-left">
      <img id="modalImage">
    </div>

    <div class="modal-right">
      <h2 id="posterTitle"></h2>
      <p id="posterDesc"></p>
    </div>
  </div>

  <button class="nav-btn next-btn" onclick="nextPoster()">❯</button>
</div>

<footer>
  © 2026 Prateek Gupta · Poster Portfolio
</footer>

<script>
const modal = document.getElementById("modal");
const modalImage = document.getElementById("modalImage");
const posterTitle = document.getElementById("posterTitle");
const posterDesc = document.getElementById("posterDesc");

const posters = [
  {
    src:"./images/poster1.jpg",
    title:"Cyberpunk Energy",
    desc:"A bold futuristic composition with strong neon contrast and dramatic lighting depth."
  },
  {
    src:"./images/poster2.jpg",
    title:"Minimal Identity",
    desc:"A typography-driven layout focusing on spacing, balance and structured visual hierarchy."
  },
  {
    src:"./images/poster3.jpg",
    title:"Visual Impact",
    desc:"Experimenting with color theory and composition to create emotional storytelling."
  },
  {
    src:"./images/poster4.jpg",
    title:"Concept Driven",
    desc:"Strategically crafted poster built around strong composition and visual clarity."
  }
];

let currentIndex = 0;

function openModal(img){
  currentIndex = posters.findIndex(p => p.src === img);
  modalImage.src = img;
  posterTitle.innerText = posters[currentIndex].title;
  posterDesc.innerText = posters[currentIndex].desc;
  modal.classList.add("active");
}

function closeModal(){
  modal.classList.remove("active");
}

function nextPoster(){
  currentIndex = (currentIndex+1)%posters.length;
  updatePoster();
}

function prevPoster(){
  currentIndex = (currentIndex-1+posters.length)%posters.length;
  updatePoster();
}

function updatePoster(){
  modalImage.src = posters[currentIndex].src;
  posterTitle.innerText = posters[currentIndex].title;
  posterDesc.innerText = posters[currentIndex].desc;
}

document.addEventListener("keydown",function(e){
  if(modal.classList.contains("active")){
    if(e.key==="ArrowRight") nextPoster();
    if(e.key==="ArrowLeft") prevPoster();
    if(e.key==="Escape") closeModal();
  }
});
</script>

</body>
</html>
